name: Terraform

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - destroy

permissions:
  id-token: write
  contents: read

jobs:

################################################################################
# PR VALIDATION
################################################################################

  pr-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670412093018:role/github-action-role
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true

################################################################################
# PRODUCTION PLAN
################################################################################

  production-plan:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      plan-created: true

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670412093018:role/github-action-role
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

################################################################################
# APPLY (Manual Approval)
################################################################################

  apply:
    if: github.event_name == 'push'
    needs: production-plan

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670412093018:role/github-action-role
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

################################################################################
# DESTROY (Manual Trigger Only)
################################################################################

  destroy:
    if: github.event_name == 'workflow_dispatch' &&
        github.event.inputs.action == 'destroy'

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670412093018:role/github-action-role
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy Plan
        run: terraform plan -destroy -out=destroyplan

      - name: Terraform Destroy
        run: terraform apply -auto-approve destroyplan
